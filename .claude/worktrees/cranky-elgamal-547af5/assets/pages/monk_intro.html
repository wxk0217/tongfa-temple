<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>祖師傳記</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&display=swap">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100%;height:100%;overflow:auto;
                  background:#fffcf5;font-family:'Noto Serif TC','STSong',serif;}
        .wrap{padding:36px 32px;}
        h2{font-size:1.25rem;font-weight:700;color:#5d4037;letter-spacing:5px;margin-bottom:8px;}
        .subtitle{font-size:0.8rem;color:#c6a059;letter-spacing:3px;margin-bottom:20px;}
        .divider{width:100%;height:1px;background:rgba(198,160,89,0.3);margin-bottom:20px;}
        p{font-size:0.88rem;line-height:2.1;color:#3d2b1f;margin-bottom:14px;}
        .note{font-size:0.78rem;color:#9a8a7a;margin-top:24px;
              padding:12px;border:1px dashed rgba(198,160,89,0.3);
              border-radius:4px;line-height:1.8;}
    </style>
</head>
<body>
<div class="wrap">
    <h2>祖師傳記</h2>
    <div class="subtitle">法脈傳承人物誌</div>
    <div class="divider"></div>
    <p>本節收錄通法禪寺曹洞宗法脈中，具有重要傳承地位之祖師傳記。各位祖師或開宗立派，或護法渡眾，或跨海弘化，共同構成這一條綿延千年的法脈。</p>
    <p>傳記資料以歷史文獻為本，輔以本寺文獻整理而成。部分祖師史料尚在持續蒐集補充中，歡迎各方善知識提供資料協助完善。</p>
    <div class="note">
        ※ 雙擊法脈圖中的祖師名稱，可顯示簡介資訊。<br>
        ※ 以下傳記頁收錄有完整文獻記載的祖師，其餘祖師資料請見法脈圖懸浮說明。
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現任執事</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        html,body{margin:0;padding:0;width:100%;height:100%;overflow:auto;background:transparent;}
        .spread{display:flex;width:100%;height:100%;}
        .spread-photo{width:50%;height:100%;overflow:hidden;flex-shrink:0;}
        .spread-photo img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
        .spread-text{width:50%;height:100%;overflow:auto;flex-shrink:0;}
        /* 窄版：單欄堆疊 */
        @media (max-width: 500px) {
            .spread{flex-direction:column;}
            .spread-photo,.spread-text{width:100%;height:auto;flex-shrink:unset;}
            .spread-photo{height:200px;}
        }
    </style>
</head>
<body>
<div class="spread">
    <div class="spread-photo">
        <img src="../img/temple_entrance.jpg" alt="通法禪寺">
    </div>
    <div class="spread-text"><div class="content-container">
        <h2>現任執事</h2>
        <div class="officer-info">
            <h3>住持：達能老師和尚</h3>
            <p>現任法脈傳承者，領大眾修習默照禪風。</p>
            <p>秉持曹洞宗「動靜體悟」之精神，於現代都市中弘揚禪法。</p>
        </div>
        <div class="page-num">肆</div>
    </div></div>
</div>
</body>
</html>

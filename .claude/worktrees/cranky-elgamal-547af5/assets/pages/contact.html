<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡方式</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        html,body{margin:0;padding:0;width:100%;height:100%;overflow:auto;background:transparent;}
        .spread{display:flex;width:100%;height:100%;}
        .spread-left{width:50%;height:100%;overflow:auto;flex-shrink:0;}
        .spread-right{width:50%;height:100%;overflow:hidden;flex-shrink:0;}
        .map-frame{width:100%;height:100%;border:none;display:block;}
        /* 窄版：單欄堆疊 */
        @media (max-width: 500px) {
            .spread{flex-direction:column;}
            .spread-left,.spread-right{width:100%;height:auto;flex-shrink:unset;}
            .spread-right{height:260px;}
        }
    </style>
</head>
<body>
<div class="spread">
    <div class="spread-left"><div class="content-container">
        <h2>聯絡方式</h2>

        <div class="contact-highlight">
            <div class="contact-item phone">
                <i class="fas fa-phone"></i>
                <div>
                    <h3>電話</h3>
                    <p>(02) 2345-6789</p>
                </div>
            </div>

            <div class="contact-item line">
                <i class="fab fa-line"></i>
                <div>
                    <h3>Line</h3>
                    <p>@tongfasi</p>
                </div>
            </div>
        </div>

        <div class="contact-extra">
            <div class="extra-item">
                <i class="fas fa-map-marker-alt"></i>
                <strong>地址</strong>
                <p>台北市中正區○○路○○號</p>
            </div>

            <div class="extra-item">
                <i class="fas fa-envelope"></i>
                <strong>信箱</strong>
                <p>info@tongfasi.tw</p>
            </div>

            <div class="extra-item">
                <i class="fas fa-clock"></i>
                <strong>開放時間</strong>
                <p>週一至週日　09:00 - 17:00</p>
            </div>
        </div>

        <div class="page-num">陸</div>
    </div></div>

    <div class="spread-right">
        <!-- Google Maps 以地名搜尋嵌入 -->
        <iframe
            class="map-frame"
            src="https://maps.google.com/maps?q=%E9%80%9A%E6%B3%95%E7%A6%AA%E5%AF%BA&output=embed&hl=zh-TW"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="通法禪寺地圖">
        </iframe>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100%;height:100%;overflow:auto;background:#fffcf5;
                  font-family:'Noto Serif TC','STSong',serif;}
        .wrap{padding:36px 32px;}
        h2{font-size:1.25rem;font-weight:700;color:#5d4037;letter-spacing:5px;margin-bottom:8px;}
        .sub{font-size:0.8rem;color:#c6a059;letter-spacing:3px;margin-bottom:20px;}
        .div{width:100%;height:1px;background:rgba(198,160,89,0.3);margin-bottom:20px;}
        p{font-size:0.88rem;line-height:2.1;color:#3d2b1f;margin-bottom:14px;}
    </style>
</head>
<body>
<div class="wrap">
    <h2>文物典藏</h2>
    <div class="sub">院內歷史文物導覽</div>
    <div class="div"></div>
    <p>通法禪寺保存多件具有歷史與宗教意義的文物，包含日治時期遺留的佛像及石刻，以及歷代住持供奉之尊像。</p>
    <p>院外石刻為日本時期遺留，具有珍貴的歷史價值。一樓大殿主供釋迦摩尼佛，另保存不動明王及二侍者像。三樓地藏殿供奉地藏菩薩，四樓文殊殿除文殊菩薩外，並供奉本寺歷代住持。</p>
</div>
</body>
</html>

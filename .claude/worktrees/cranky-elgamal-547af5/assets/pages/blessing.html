<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝福</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        html,body{margin:0;padding:0;width:100%;height:100%;overflow:auto;background:transparent;}
    </style>
    
</head>
<body>
<div class="content-container" style="padding: 0; border: none; display: flex; align-items: center; justify-content: center;">
                        <!-- 動畫觀音石像 -->
                        <svg class="guanyin-icon" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <filter id="glow">
                                    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                                    <feMerge>
                                        <feMergeNode in="coloredBlur"/>
                                        <feMergeNode in="SourceGraphic"/>
                                    </feMerge>
                                </filter>
                                <radialGradient id="lightRays">
                                    <stop offset="0%" stop-color="#c6a059" stop-opacity="0.8"/>
                                    <stop offset="100%" stop-color="#c6a059" stop-opacity="0"/>
                                </radialGradient>
                            </defs>
                            <circle cx="100" cy="80" r="90" fill="none" stroke="#c6a059" stroke-width="1" opacity="0.3" class="light-ring-1"/>
                            <circle cx="100" cy="80" r="70" fill="none" stroke="#c6a059" stroke-width="1" opacity="0.2" class="light-ring-2"/>
                            <circle cx="100" cy="60" r="45" fill="#c6a059" opacity="0.15" filter="url(#glow)"/>
                            <ellipse cx="100" cy="60" rx="28" ry="32" fill="#d4a574" stroke="#8b6f47" stroke-width="1.5"/>
                            <path d="M 75 45 Q 100 25 125 45 Q 100 35 75 45 Z" fill="#8b6f47" stroke="#5d4037" stroke-width="1"/>
                            <ellipse cx="100" cy="62" rx="18" ry="20" fill="#deb887"/>
                            <circle cx="94" cy="58" r="2" fill="#5d4037"/>
                            <circle cx="106" cy="58" r="2" fill="#5d4037"/>
                            <line x1="100" y1="60" x2="100" y2="66" stroke="#5d4037" stroke-width="1"/>
                            <path d="M 92 70 Q 100 72 108 70" stroke="#8b6f47" stroke-width="1" fill="none"/>
                            <rect x="93" y="88" width="14" height="12" fill="#deb887"/>
                            <path d="M 100 100 Q 75 115 70 150 L 70 180 Q 85 200 100 210 Q 115 200 130 180 L 130 150 Q 125 115 100 100 Z" fill="#c9a961" stroke="#8b6f47" stroke-width="1.5"/>
                            <path d="M 72 140 Q 65 160 62 180" stroke="#a89a7f" stroke-width="2" fill="none" opacity="0.6" class="flowing"/>
                            <path d="M 128 140 Q 135 160 138 180" stroke="#a89a7f" stroke-width="2" fill="none" opacity="0.6" class="flowing"/>
                            <circle cx="68" cy="130" r="5" fill="#deb887"/>
                            <circle cx="132" cy="130" r="5" fill="#deb887"/>
                            <ellipse cx="100" cy="225" rx="35" ry="8" fill="#8b6f47" opacity="0.8"/>
                            <rect x="85" y="215" width="30" height="6" fill="#9d7e54" opacity="0.6"/>
                        </svg>
                        <h3 style="margin-top: 15px;">願以此功德 莊嚴佛淨土</h3>
                    </div>

</body>
</html>

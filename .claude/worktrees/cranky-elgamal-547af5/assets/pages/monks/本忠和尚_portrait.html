<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>本忠和尚</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100%;height:100%;overflow:hidden;background:#1b3040;font-family:'Noto Serif TC','STSong',serif;}
        .portrait-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:32px;}
        .portrait-placeholder{width:180px;height:220px;border:3px solid #c6a059;border-radius:4px;background:#21384a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
        .placeholder-char{font-size:4rem;color:rgba(198,160,89,0.5);font-weight:300;}
        .placeholder-label{font-size:0.75rem;color:rgba(198,160,89,0.4);letter-spacing:2px;}
        .portrait-name{font-size:1.6rem;font-weight:700;color:#f0e6c8;letter-spacing:6px;text-align:center;}
        .portrait-era{font-size:0.85rem;color:rgba(198,160,89,0.7);letter-spacing:3px;text-align:center;}
        .portrait-divider{width:60px;height:1px;background:rgba(198,160,89,0.4);}
    </style>
</head>
<body>
    <div class="portrait-wrap">
        <div class="portrait-placeholder">
            <div class="placeholder-char">忠</div>
            <div class="placeholder-label">暫無圖像</div>
        </div>
        <div class="portrait-divider"></div>
        <div class="portrait-name">本忠和尚</div>
        <div class="portrait-era">【清】? - 1938</div>
    </div>
</body>
</html>

    <!-- 傳記彈窗 -->
    <div id="bioModal" class="bio-modal" style="display:none;">
        <div class="bio-modal-content">
            <button class="bio-modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <div style="display:flex;gap:20px;align-items:flex-start;">
                <img id="bioPortrait" style="width:100px;height:120px;object-fit:cover;border-radius:4px;flex-shrink:0;display:none;">
                <div style="flex:1;">
                    <h2 id="bioName" style="margin:0 0 12px;font-size:1.3rem;color:var(--primary-color)"></h2>
                    <p id="bioStory" style="white-space:pre-wrap;line-height:1.9;font-size:0.9rem;"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Tooltip -->
    <div id="hoverTooltip" class="hover-tooltip"></div>

    <script>
    // PAGE_MAP — 固定名稱對應 leaf index
    const PAGE_MAP = {
    'cover': 0,
    'colophon': 1,
    'intro': 2,
    'lineage': 3,
    'direct': 4,
    'caodong': 5,
    'shouchang': 6,
    'monks': 7,
    '無明慧經': 8,
    '妙蓮法師': 9,
    '圓瑛大師': 10,
    '白聖長老': 11,
    '覺力禪師': 12,
    '妙振老和尚': 13,
    '達能和尚': 14,
    '林圓貴居士': 15,
    'artifacts': 16,
    'floor1': 17,
    'floor34': 18,
    'members': 19,
    'activities': 20,
    'contact': 21,
    'blessing': 22,
};

    function flipTo(name) {
        const idx = PAGE_MAP[name];
        if (idx !== undefined) flipToPage(idx);
    }
    </script>

<script>
const PAGE_MAP = {
  'cover':       0,
  'colophon':    1,
  'intro':       2,
  'shouchang':   5,   // ← 壽昌法派在 leaf-5 front
  'lineage':     3,   // ← 法脈導言在 leaf-3 back，翻到 leaf-3 後顯示

  'direct':      5,   // ← 直系傳承在 leaf-5 back

  '妙蓮法師':    9,
  '圓瑛大師':   10,

  '覺力禪師':   12,
  '妙振老和尚': 13,
  '達能和尚':   14,
  '林圓貴居士': 15,
  'artifacts':  16,
  'floor1':     17,
  'floor34':    18,
  'members':    19,
  'activities': 20,
  'contact':    21,
  'blessing':   22,
};

function flipTo(name) {
  var idx = PAGE_MAP[name];
  if (idx !== undefined) flipToPage(idx);
}
</script>

<script>
const PAGE_MAP = {
  'cover':       0,
  'colophon':    1,
  'intro':       2,
  'lineage':     3,
  'caodong':     3,
  'shouchang':   4,
  'direct':      3,
  'monks':       5,
  '妙蓮法師':    6,
  '圓瑛大師':    7,
  '白聖長老':    8,
  '覺力禪師':    9,
  '妙振老和尚': 10,
  '達能和尚':   11,
  '林圓貴居士': 12,
  'artifacts':  13,
  'floor1':     15,
  'floor34':    16,
  'members':    17,
  'activities': 18,
  'contact':    19,
  'blessing':   20,
};

function flipTo(name) {
  var idx = PAGE_MAP[name];
  if (idx !== undefined) flipToPage(idx);
}

function openCaodongModal(src) {
  const modal = document.getElementById('caodongModal');
  const iframe = document.getElementById('caodongModalIframe');
  iframe.src = src;
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  // 重設縮放
  _zoom = 1; _panX = 0; _panY = 0;
  _applyTransform();
}

function closeCaodongModal() {
  const modal = document.getElementById('caodongModal');
  const iframe = document.getElementById('caodongModalIframe');
  modal.style.display = 'none';
  iframe.src = '';
  document.body.style.overflow = '';
}

// 縮放拖曳狀態
let _zoom = 1, _panX = 0, _panY = 0;
let _dragging = false, _lastX = 0, _lastY = 0;
let _lastDist = 0;

function _applyTransform() {
  const iframe = document.getElementById('caodongModalIframe');
  const wrapper = document.getElementById('caodongWrapper');
  if (!iframe || !wrapper) return;
  const w = wrapper.clientWidth, h = wrapper.clientHeight;
  // 限制 pan 範圍
  const maxX = Math.max(0, w * _zoom - w);
  const maxY = Math.max(0, h * _zoom - h);
  _panX = Math.min(0, Math.max(-maxX, _panX));
  _panY = Math.min(0, Math.max(-maxY, _panY));
  iframe.style.transform = `translate(${_panX}px, ${_panY}px) scale(${_zoom})`;
}

document.addEventListener('DOMContentLoaded', function() {
  const modal = document.getElementById('caodongModal');
  const wrapper = document.getElementById('caodongWrapper');

  modal.addEventListener('click', e => {
    if (e.target.id === 'caodongModal') closeCaodongModal();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeCaodongModal();
  });

  // 滾輪縮放
  wrapper.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    _zoom = Math.min(5, Math.max(1, _zoom * delta));
    _applyTransform();
  }, { passive: false });

  // 滑鼠拖曳
  wrapper.addEventListener('mousedown', e => {
    _dragging = true; _lastX = e.clientX; _lastY = e.clientY;
    wrapper.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', e => {
    if (!_dragging) return;
    _panX += e.clientX - _lastX;
    _panY += e.clientY - _lastY;
    _lastX = e.clientX; _lastY = e.clientY;
    _applyTransform();
  });
  document.addEventListener('mouseup', () => {
    _dragging = false;
    wrapper.style.cursor = 'grab';
  });

  // 觸控 pinch-to-zoom
  wrapper.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      _lastDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    } else if (e.touches.length === 1) {
      _dragging = true;
      _lastX = e.touches[0].clientX;
      _lastY = e.touches[0].clientY;
    }
  }, { passive: true });
  wrapper.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      if (_lastDist > 0) {
        _zoom = Math.min(5, Math.max(1, _zoom * (dist / _lastDist)));
        _applyTransform();
      }
      _lastDist = dist;
    } else if (e.touches.length === 1 && _dragging) {
      _panX += e.touches[0].clientX - _lastX;
      _panY += e.touches[0].clientY - _lastY;
      _lastX = e.touches[0].clientX;
      _lastY = e.touches[0].clientY;
      _applyTransform();
    }
  }, { passive: false });
  wrapper.addEventListener('touchend', () => {
    _dragging = false; _lastDist = 0;
  });
});
</script>

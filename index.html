</head>
<body>
<header>

      <button onclick="flipTo('lineage')" class="nav-btn" data-nav="lineage">法脈傳承</button>

        <button onclick="flipTo('caodong')" class="submenu-btn">曹洞正宗法脈全圖</button>
        <button onclick="flipTo('shouchang')" class="submenu-btn">壽昌法派</button>
        <button onclick="flipTo('direct')" class="submenu-btn">直系傳承</button>
        <button onclick="flipTo('monks')" class="submenu-btn">祖師傳記</button>
      </div>
    </div>
    <button onclick="flipTo('artifacts')" class="nav-btn" data-nav="artifacts">文物典藏</button>

      <div class="leaf" id="leaf-0" data-nav="cover" data-sub="">

      <div class="leaf" id="leaf-3" data-nav="lineage" data-sub="">
        <div class="page-front"></div>

        <div class="page-back"></div>

    <div style="display:flex;gap:20px;align-items:flex-start;">
      <img id="bioPortrait" style="width:100px;height:120px;object-fit:cover;border-radius:4px;flex-shrink:0;display:none;">
      <div style="flex:1;">
        <h2 id="bioName" style="margin:0 0 12px;font-size:1.3rem;color:var(--primary-color)"></h2>
        <p id="bioStory" style="white-space:pre-wrap;line-height:1.9;font-size:0.9rem;"></p>
      </div>
    </div>
  </div>

<div id="hoverTooltip" class="hover-tooltip"></div>

<script>
const PAGE_MAP = {
  'cover':       0,
  'colophon':    1,
  'intro':       2,
  'lineage':     3,
  'caodong':     4,
  'shouchang':   5,
  'direct':      5,
  'monks':       6,
  '妙蓮法師':    7,
  '圓瑛大師':    8,
  '白聖長老':    9,
  '覺力禪師':   10,
  '妙振老和尚': 11,
  '達能和尚':   12,
  '林圓貴居士': 13,
  'artifacts':  14,
  'floor1':     15,
  'floor34':    16,
  'members':    17,
  'activities': 18,
  'contact':    19,
  'blessing':   20,
};

function flipTo(name) {
  var idx = PAGE_MAP[name];
  if (idx !== undefined) flipToPage(idx);
}
</script>

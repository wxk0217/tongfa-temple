<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>曹洞正宗 通法禪寺 — 互動翻頁書</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fix.css">
</head>
<body>

    <header>
        <nav id="mainNav" class="main-nav">
            <button onclick="flipToPage(0)" class="nav-btn active-nav">封面</button>
            <button onclick="flipToPage(2)" class="nav-btn">簡介</button>
            <button onclick="flipToPage(3)" class="nav-btn">法脈傳承</button>
            <button onclick="flipToPage(4)" class="nav-btn">文物典藏</button>
            <button onclick="flipToPage(5)" class="nav-btn">現任執事</button>
            <button onclick="flipToPage(6)" class="nav-btn">寺務活動</button>
            <button onclick="flipToPage(7)" class="nav-btn">聯絡我們</button>
        </nav>
        <div class="device-switcher" id="deviceSwitcher">
            <button class="device-btn active" data-device="desktop" title="桌機版"><i class="fas fa-desktop"></i></button>
            <button class="device-btn" data-device="tablet"  title="平板版"><i class="fas fa-tablet-alt"></i></button>
            <button class="device-btn" data-device="mobile"  title="手機版"><i class="fas fa-mobile-alt"></i></button>
        </div>
    </header>

    <main id="viewport">
        <div class="book-container">
            <div id="bookFlip" class="book">

                <div class="book-bg-left"></div>
                <div class="book-bg-right"></div>

                <!-- LEAF-0: 封面 -->
                <div class="leaf" id="leaf-0">
                    <div class="page-front cover-front"></div>
                    <div class="page-back">
                        <iframe src="assets/pages/cover.html" class="page-iframe" title="封面"></iframe>
                    </div>
                </div>

                <!-- LEAF-1: 扉頁 -->
                <div class="leaf" id="leaf-1">
                    <div class="page-front"></div>
                    <div class="page-back">
                        <iframe src="assets/pages/colophon.html" class="page-iframe" title="扉頁"></iframe>
                    </div>
                </div>

                <!-- LEAF-2: 本寺簡介 -->
                <div class="leaf" id="leaf-2">
                    <div class="page-front">
                        <iframe src="assets/pages/intro.html" class="page-iframe" title="本寺簡介"></iframe>
                    </div>
                    <div class="page-back"></div>
                </div>

                <!-- LEAF-3: 法脈傳承 -->
                <div class="leaf" id="leaf-3">
                    <div class="page-front">
                        <iframe id="lineage-frame" src="assets/lineage/direct.html" class="page-iframe" title="法脈傳承"></iframe>
                    </div>
                    <div class="page-back"></div>
                </div>

                <!-- LEAF-4: 文物典藏 -->
                <div class="leaf" id="leaf-4">
                    <div class="page-front">
                        <iframe src="assets/pages/artifacts.html" class="page-iframe" title="文物典藏"></iframe>
                    </div>
                    <div class="page-back"></div>
                </div>

                <!-- LEAF-5: 現任執事 -->
                <div class="leaf" id="leaf-5">
                    <div class="page-front">
                        <iframe src="assets/pages/members.html" class="page-iframe" title="現任執事"></iframe>
                    </div>
                    <div class="page-back"></div>
                </div>

                <!-- LEAF-6: 寺務活動 -->
                <div class="leaf" id="leaf-6">
                    <div class="page-front">
                        <iframe src="assets/pages/activities.html" class="page-iframe" title="寺務活動"></iframe>
                    </div>
                    <div class="page-back"></div>
                </div>

                <!-- LEAF-7: 聯絡方式 -->
                <div class="leaf" id="leaf-7">
                    <div class="page-front">
                        <iframe src="assets/pages/contact.html" class="page-iframe" title="聯絡方式"></iframe>
                    </div>
                    <div class="page-back"></div>
                </div>

                <!-- LEAF-8: 結尾祝福 -->
                <div class="leaf" id="leaf-8">
                    <div class="page-front"></div>
                    <div class="page-back">
                        <iframe src="assets/pages/blessing.html" class="page-iframe" title="結尾祝福"></iframe>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- 傳記彈窗 -->
    <div id="bioModal" class="bio-modal" style="display:none;">
        <div class="bio-modal-content">
            <button class="bio-modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <div style="display:flex;gap:20px;align-items:flex-start;">
                <img id="bioPortrait" style="width:100px;height:120px;object-fit:cover;border-radius:4px;flex-shrink:0;display:none;">
                <div style="flex:1;">
                    <h2 id="bioName" style="margin:0 0 12px;font-size:1.4rem;color:var(--primary-color)"></h2>
                    <p id="bioStory" style="white-space:pre-wrap;line-height:1.9;font-size:0.95rem;"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Tooltip -->
    <div id="hoverTooltip" class="hover-tooltip"></div>

    <!-- 載入順序：data → 翻頁引擎 → 彈窗 → 法脈 → 書本尺寸 → 裝置切換 → 主程式 -->
    <script src="js/data.js"></script>
    <script src="js/flip-engine.js"></script>
    <script src="js/bio-modal.js"></script>
    <script src="js/lineage.js"></script>
    <script src="js/book-engine.js"></script>
    <script src="js/device-switcher.js"></script>
    <script src="js/main.js"></script>

</body>
</html>

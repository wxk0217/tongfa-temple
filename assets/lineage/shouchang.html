<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>壽昌法派</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: transparent;
            overflow: auto;
        }
        .lineage-frame-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 16px;
            box-sizing: border-box;
            
        }
        .mermaid {
            
            padding: 20px;
        }
        /* 傳記卡片 */
        .biographies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            padding: 16px;
            width: 100%;
            box-sizing: border-box;
        }
        .bio-card {
            background: rgba(255,252,245,0.9);
            border: 1px solid #e3dcc8;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
        }
        .bio-card-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 8px;
        }
        .bio-card-name {
            font-size: 1rem;
            color: var(--primary-color, #5d4037);
            margin: 4px 0;
        }
        .bio-card-short {
            font-size: 0.8rem;
            color: #7a6a5a;
            line-height: 1.5;
        }
        .bio-card-btn {
            margin-top: 8px;
            padding: 4px 10px;
            background: var(--primary-color, #5d4037);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body style="position:relative;">
    <div style="
        position:absolute; top:12px; left:50%; transform:translateX(-50%);
        font-family:'Noto Serif TC','STSong',serif;
        font-size:0.95rem; font-weight:700; color:#5d4037;
        letter-spacing:4px; white-space:nowrap;
        background:rgba(255,252,245,0.9); padding:4px 16px;
        border-bottom:1px solid rgba(198,160,89,0.4);
        z-index:100; pointer-events:none;
    ">壽昌法派</div>

    <div class="lineage-frame-wrap">
        <iframe src="shouchang_lineage.html" class="lineage-iframe" title="壽昌法派歷代傳承" loading="lazy" scrolling="yes"></iframe>
    </div>
    
    
    

    <script>
    // 法脈圖節點點擊 → 通知主頁面開啟傳記彈窗
    (function() {
        var tapTimer = null;

        function getName(node) {
            var label = node.querySelector('.nodeLabel, .label, text');
            if (!label) return '';
            return (label.textContent || label.innerHTML || '').replace(/<[^>]*>/g, '').trim();
        }

        // 桌機：雙擊
        document.addEventListener('dblclick', function(e) {
            var node = e.target.closest('.node');
            if (!node) return;
            var name = getName(node);
            if (name) window.parent.postMessage({ action: 'openModal', name: name }, '*');
        });

        // 觸控：單點顯示 tooltip，雙點開彈窗
        document.addEventListener('touchend', function(e) {
            var node = e.target.closest('.node');
            if (!node) return;
            e.preventDefault();
            var name = getName(node);
            if (!name) return;
            if (tapTimer) {
                clearTimeout(tapTimer);
                tapTimer = null;
                window.parent.postMessage({ action: 'openModal', name: name }, '*');
            } else {
                tapTimer = setTimeout(function() {
                    tapTimer = null;
                    window.parent.postMessage({ action: 'showTooltip', name: name }, '*');
                }, 280);
            }
        }, { passive: false });

        // 桌機：hover → tooltip
        document.addEventListener('mouseover', function(e) {
            var node = e.target.closest('.node');
            if (!node) return;
            var name = getName(node);
            if (name) window.parent.postMessage({ action: 'showTooltip', name: name }, '*');
        });
        document.addEventListener('mouseout', function(e) {
            if (e.target.closest('.node'))
                window.parent.postMessage({ action: 'hideTooltip' }, '*');
        });
    })();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>壽昌法派</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: transparent;
            overflow: auto;
        }
        .lineage-frame-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 16px;
            box-sizing: border-box;
            
        }
        .mermaid {
            
            padding: 20px;
        }
        /* 傳記卡片 */
        .biographies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            padding: 16px;
            width: 100%;
            box-sizing: border-box;
        }
        .bio-card {
            background: rgba(255,252,245,0.9);
            border: 1px solid #e3dcc8;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
        }
        .bio-card-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 8px;
        }
        .bio-card-name {
            font-size: 1rem;
            color: var(--primary-color, #5d4037);
            margin: 4px 0;
        }
        .bio-card-short {
            font-size: 0.8rem;
            color: #7a6a5a;
            line-height: 1.5;
        }
        .bio-card-btn {
            margin-top: 8px;
            padding: 4px 10px;
            background: var(--primary-color, #5d4037);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="lineage-frame-wrap">
        <iframe src="assets/lineage/shouchang_lineage.html" class="lineage-iframe" title="壽昌法派歷代傳承" loading="lazy" scrolling="yes"></iframe>
    </div>
    
    
    
</body>
</html>

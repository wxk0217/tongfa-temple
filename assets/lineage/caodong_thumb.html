<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #f8f5f0;
    font-family: "Microsoft JhengHei", "PingFang TC", serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .card {
    background: white;
    border: 1px solid #d7ccc8;
    border-radius: 12px;
    padding: 36px 32px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    max-width: 340px;
    width: 90%;
  }
  .card-title {
    font-size: 1.4rem;
    letter-spacing: 4px;
    color: #3e2723;
    margin-bottom: 8px;
  }
  .card-sub {
    font-size: 0.78rem;
    color: #8d6e63;
    letter-spacing: 2px;
    margin-bottom: 28px;
  }
  .preview-hint {
    font-size: 0.82rem;
    color: #795548;
    margin-bottom: 20px;
    line-height: 1.7;
  }
  .zoom-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #3e2723;
    color: #d7ccc8;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-size: 0.95rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .zoom-btn:hover { background: #5d4037; }
  .zoom-btn svg { width: 18px; height: 18px; fill: currentColor; }

  /* Modal */
  #imageModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 99999;
  }
  #imageModal iframe {
    width: 96vw;
    height: 92vh;
    border: none;
    border-radius: 8px;
    background: #f8f5f0;
  }
  .image-close {
    position: absolute;
    top: 16px; right: 20px;
    font-size: 36px;
    color: white;
    background: none;
    border: none;
    cursor: pointer;
    line-height: 1;
    opacity: 0.85;
  }
  .image-close:hover { opacity: 1; }
</style>
</head>
<body>

<div class="card">
  <div class="card-title">曹洞正宗法脈全圖</div>
  <div class="card-sub">依據《壽昌法派・鼓山繽派》歷代傳承校訂人名</div>
  <p class="preview-hint">本圖涵蓋唐宋至近代台灣<br>歷代法脈傳承關係，圖幅較大<br>建議點擊放大檢視</p>
  <button class="zoom-btn" onclick="openImageModal()">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/><path d="M12 10h-2v2H9v-2H7V9h2V7h1v2h2v1z"/></svg>
    放大檢視
  </button>
</div>

<!-- Modal -->
<div id="imageModal">
  <button class="image-close" onclick="closeImageModal()">✕</button>
  <iframe id="modalIframe" src=""></iframe>
</div>

<script>
function openImageModal() {
  // 嘗試呼叫父頁面的 Modal，若在 iframe 內則往上傳遞
  try {
    const top = window.top;
    top.openCaodongModal('assets/lineage/caodong.html');
  } catch(e) {
    // fallback：在本頁開啟
    const modal = document.getElementById('imageModal');
    const iframe = document.getElementById('modalIframe');
    iframe.src = 'caodong.html';
    modal.style.display = 'flex';
  }
}

function closeImageModal() {
  const modal = document.getElementById('imageModal');
  const iframe = document.getElementById('modalIframe');
  modal.style.display = 'none';
  iframe.src = '';
}

document.getElementById('imageModal').addEventListener('click', e => {
  if (e.target.id === 'imageModal') closeImageModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeImageModal();
});
</script>
</body>
</html>

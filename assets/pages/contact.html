<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡方式</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100%;min-height:100%;overflow-y:auto;
                  background:#fffcf5;font-family:'Noto Serif TC','STSong',serif;}
        .wrap{padding:28px 20px 40px;}
        h2{font-size:1.2rem;font-weight:700;color:#5d4037;letter-spacing:5px;margin-bottom:6px;}
        .subtitle{font-size:0.78rem;color:#c6a059;letter-spacing:3px;margin-bottom:16px;}
        .divider{width:100%;height:1px;background:rgba(198,160,89,0.3);margin-bottom:20px;}

        .contact-block{
            background:#fff;border:1px solid #e3dcc8;border-radius:10px;
            padding:16px 18px;margin-bottom:12px;
            display:flex;align-items:center;gap:14px;
        }
        .contact-block i{
            font-size:1.3rem;color:#c6a059;width:24px;text-align:center;flex-shrink:0;
        }
        .contact-block h3{font-size:0.8rem;color:#9a8a7a;letter-spacing:2px;margin-bottom:2px;}
        .contact-block p{font-size:0.95rem;color:#3d2b1f;font-weight:600;letter-spacing:1px;}

        .map-wrap{
            border-radius:10px;overflow:hidden;
            border:1px solid #e3dcc8;
            margin-top:20px;height:220px;
        }
        .map-wrap iframe{width:100%;height:100%;border:none;display:block;}
    </style>
</head>
<body>
<div class="wrap">
    <h2>聯絡我們</h2>
    <div class="subtitle">通法禪寺</div>
    <div class="divider"></div>

    <div class="contact-block">
        <i class="fas fa-phone"></i>
        <div>
            <h3>電話</h3>
            <p>(02) 2345-6789</p>
        </div>
    </div>

    <div class="contact-block">
        <i class="fab fa-line"></i>
        <div>
            <h3>Line</h3>
            <p>@tongfasi</p>
        </div>
    </div>

    <div class="contact-block">
        <i class="fas fa-map-marker-alt"></i>
        <div>
            <h3>地址</h3>
            <p>台北市中正區○○路○○號</p>
        </div>
    </div>

    <div class="contact-block">
        <i class="fas fa-envelope"></i>
        <div>
            <h3>信箱</h3>
            <p>info@tongfasi.tw</p>
        </div>
    </div>

    <div class="contact-block">
        <i class="fas fa-clock"></i>
        <div>
            <h3>開放時間</h3>
            <p>週一至週日　09:00–17:00</p>
        </div>
    </div>

    <div class="map-wrap">
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3614.5723469823456!2d121.50850762341071!3d25.034234277393098!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3442a98765af66d5%3A0x1234567890abcdef!2z5pil5pil6Jut6Jut!5e0!3m2!1szh-TW!2stw!4v1234567890"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>
</div>
</body>
</html>

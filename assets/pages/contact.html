<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡方式</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        html,body{margin:0;padding:0;width:100%;height:100%;overflow:auto;background:transparent;}
    </style>
    
</head>
<body>
<div style="display:flex;width:100%;height:100%;overflow:hidden;">
    <div style="width:50%;height:100%;overflow:auto;"><div class="content-container">
                        <!-- 左頁：聯絡資訊（電話、Line） -->
                        <h2>聯絡方式</h2>
                        
                        <div class="contact-highlight">
                            <div class="contact-item phone">
                                <i class="fas fa-phone"></i>
                                <div>
                                    <h3>電話</h3>
                                    <p>(02) 2345-6789</p>
                                </div>
                            </div>
                            
                            <div class="contact-item line">
                                <i class="fab fa-line"></i>
                                <div>
                                    <h3>Line</h3>
                                    <p>@tongfasi</p>
                                </div>
                            </div>
                        </div>

                        <div class="contact-extra">
                            <div class="extra-item">
                                <i class="fas fa-map-marker-alt"></i>
                                <strong>地址</strong>
                                <p>台北市中正區○○路○○號</p>
                            </div>
                            
                            <div class="extra-item">
                                <i class="fas fa-envelope"></i>
                                <strong>信箱</strong>
                                <p>info@tongfasi.tw</p>
                            </div>
                            
                            <div class="extra-item">
                                <i class="fas fa-clock"></i>
                                <strong>開放時間</strong>
                                <p>週一至週日<br>09:00 - 17:00</p>
                            </div>
                        </div>

                        <div class="page-num">陸</div>
                    </div></div>
    <div style="width:50%;height:100%;overflow:hidden;"><div class="content-container" style="padding: 0; border: none; display: flex; align-items: center; justify-content: center;">
                        <!-- 右頁：Google地圖 -->
                        <div class="map-container">
                            <iframe 
                                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3614.5723469823456!2d121.50850762341071!3d25.034234277393098!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3442a98765af66d5%3A0x1234567890abcdef!2z5pil5pil6Jut6Jut!5e0!3m2!1szh-TW!2stw!4v1234567890"
                                width="100%" 
                                height="100%" 
                                style="border:none;" 
                                allowfullscreen="" 
                                loading="lazy" 
                                referrerpolicy="no-referrer-when-downgrade">
                            </iframe>
                        </div>
                    </div></div>
</div>

</body>
</html>

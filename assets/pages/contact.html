<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡方式</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100%;height:100%;overflow:hidden;
                  background:#fffcf5;font-family:'Noto Serif TC','STSong',serif;}
        .scroll-wrap{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
        .wrap{padding:28px 20px 40px;}
        h2{font-size:1.2rem;font-weight:700;color:#5d4037;letter-spacing:5px;margin-bottom:6px;}
        .subtitle{font-size:0.78rem;color:#c6a059;letter-spacing:3px;margin-bottom:16px;}
        .divider{width:100%;height:1px;background:rgba(198,160,89,0.3);margin-bottom:20px;}

        .contact-block{
    background:#fff;border:1px solid #e3dcc8;border-radius:10px;
    padding:16px 18px;margin-bottom:12px;
    display:flex;align-items:flex-start;gap:14px;  /* ← center 改 flex-start */
}
.contact-block i{
    font-size:1.3rem;color:#c6a059;width:24px;text-align:center;flex-shrink:0;
    padding-top:3px;  /* ← 加這行，讓圖標跟文字第一行對齊 */
}
.contact-block h3{font-size:0.8rem;color:#9a8a7a;letter-spacing:2px;margin-bottom:2px;}
.contact-block p{font-size:0.95rem;color:#3d2b1f;font-weight:600;letter-spacing:1px;
    word-break:break-all;  /* ← 加這行，長網址自動換行 */
}
        .map-wrap{
            border-radius:10px;overflow:hidden;
            border:1px solid #e3dcc8;
            margin-top:20px;height:220px;
        }
        .map-wrap iframe{width:100%;height:100%;border:none;display:block;}
    </style>
</head>
<body>
<div class="scroll-wrap">
<div class="wrap">
    <h2>聯絡我們</h2>
    <div class="subtitle">通法禪寺</div>
    <div class="divider"></div>

    <div class="contact-block">
        <i class="fas fa-phone"></i>
        <div>
            <h3>電話</h3>
            <p>(02) 2364-8619</p>
        </div>
    </div>

    <div class="contact-block">
        <i class="fab fa-line"></i>
        <div>
            <h3>Line</h3>
            <p><a href="line://nv/recommendOA/@tfcs.temple" style="color:#3d2b1f;">@tfcs.temple</a></p>
        </div>
    </div>

    <div class="contact-block">
        <i class="fas fa-map-marker-alt"></i>
        <div>
            <h3>地址</h3>
            <p>台北市中正區廈門街34巷15號</p>
        </div>
    </div>

    <div class="contact-block">
        <i class="fas fa-envelope"></i>
        <div>
            <h3>臉書</h3>
            <p><a href="https://www.facebook.com/taipeitfs/" target="_blank" style="color:#3d2b1f;word-break:break-all;">https://www.facebook.com/taipeitfs/</a></p>
        </div>
    </div>

   <div class="contact-block">
        <i class="fas fa-clock"></i>
        <div>
            <h3>開放時間</h3>
            <p>週一至週日　09:00–17:00</p>
        </div>
    </div>

    <div class="contact-block">
        <i class="fas fa-globe"></i>
        <div>
            <h3>網站製作</h3>
            <p>國立臺灣大學中文系博士班<br>吳賢愷<br>u10502014@gmail.com</p>
        </div>
    </div>
      <div class="contact-block" style="padding:0;overflow:hidden;display:block;">
        <div class="map-wrap" style="margin:0;border:none;height:220px;border-radius:10px;">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3615.235041509995!2d121.51444201130185!3d25.02609637772909!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3442a99777d546bd%3A0x959ad9f5a36064b0!2z6YCa5rOV5a-6!5e0!3m2!1szh-TW!2stw!4v1778504757649!5m2!1szh-TW!2stw"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
    </div>
</div>
</body>
</html>

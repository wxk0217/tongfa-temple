<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文物典藏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        html,body{margin:0;padding:0;width:100%;height:100%;overflow:auto;background:transparent;}

        /* ── 文物圖片可點擊提示 ── */
        .artifact-item img {
            cursor: zoom-in;
            transition: opacity 0.18s;
        }
        .artifact-item img:active { opacity: 0.8; }

        /* ══ Lightbox ══ */
        #artifact-lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0,0,0,0.88);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 16px;
            box-sizing: border-box;
        }
        #artifact-lightbox.open { display: flex; }

        #lightbox-img {
            max-width: 100%;
            max-height: calc(100vh - 100px);
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            /* 支援雙指縮放手勢時不截斷 */
            touch-action: pinch-zoom;
        }

        #lightbox-caption {
            margin-top: 12px;
            color: #e8d8b8;
            font-size: 14px;
            letter-spacing: 0.08em;
            text-align: center;
            font-family: 'Noto Serif TC', 'STSong', serif;
        }

        #lightbox-close {
            position: absolute;
            top: 14px; right: 18px;
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
            padding: 4px 8px;
            opacity: 0.75;
            transition: opacity 0.15s;
        }
        #lightbox-close:hover { opacity: 1; }

        /* 左右切換箭頭 */
        .lightbox-nav {
            position: absolute;
            top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.12);
            border: none;
            color: #fff;
            font-size: 22px;
            width: 44px; height: 56px;
            border-radius: 6px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0.7;
            transition: opacity 0.15s, background 0.15s;
        }
        .lightbox-nav:hover { opacity: 1; background: rgba(255,255,255,0.22); }
        #lightbox-prev { left: 10px; }
        #lightbox-next { right: 10px; }
    </style>
</head>
<body>
<div style="display:flex;width:100%;height:100%;overflow:hidden;">
    <div style="width:100%;height:100%;overflow:auto;">
        <div class="content-container">
                        <h2>文物典藏</h2>
                        <div class="artifacts-gallery">
                            <!-- 分類一：院外 -->
                            <div class="artifact-section">
                                <h3 class="artifact-category">院外</h3>
                                <div class="artifact-grid">
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/outside/outside_01.jpg" alt="耳藥師佛">
                                        <p class="artifact-title">耳藥師佛</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/outside/outside_02.jpg" alt="藥石佛銘文">
                                        <p class="artifact-title">藥石佛銘文</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/outside/outside_03.jpg" alt="十一面觀音">
                                        <p class="artifact-title">十一面觀音</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/outside/outside_04.jpg" alt="十一面觀音銘文">
                                        <p class="artifact-title">十一面觀音銘文</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/outside/outside_05.jpg" alt="觀音">
                                        <p class="artifact-title">觀音</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/outside/outside_06.jpg" alt="觀音銘文">
                                        <p class="artifact-title">觀音銘文</p>
                                    </div>
                                </div>
                            </div>
                            <!-- 分類二：一樓大殿 -->
                            <div class="artifact-section">
                                <h3 class="artifact-category">一樓大殿</h3>
                                <div class="artifact-grid">
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/floor1/floor1_01.jpg" alt="釋迦摩尼佛與二尊者">
                                        <p class="artifact-title">釋迦摩尼佛與二尊者</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/floor1/floor1_02.jpg" alt="觀音">
                                        <p class="artifact-title">觀音</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/floor1/floor1_03.jpg" alt="不動明王與二侍者">
                                        <p class="artifact-title">不動明王與二侍者</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/floor1/floor1_04.jpg" alt="地藏王菩薩(右)">
                                        <p class="artifact-title">地藏王菩薩(右)</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/floor1/floor1_05.jpg" alt="地藏菩薩(左)">
                                        <p class="artifact-title">地藏菩薩(左)</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/floor1/floor1_06.jpg" alt="韋馱聖眾菩薩">
                                        <p class="artifact-title">韋馱聖眾菩薩</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/floor1/floor1_07.jpg" alt="韋馱天">
                                        <p class="artifact-title">韋馱天</p>
                                    </div>
                                </div>
                            </div>
                            <!-- 分類三：三樓地藏殿 -->
                            <div class="artifact-section">
                                <h3 class="artifact-category">三樓地藏殿</h3>
                                <div class="artifact-grid">
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/floor3/floor3_01.jpg" alt="地藏王菩薩(前)">
                                        <p class="artifact-title">地藏王菩薩(前)</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/floor3/floor3_02.jpg" alt="地藏王菩薩(右)">
                                        <p class="artifact-title">地藏王菩薩(右)</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/floor3/floor3_03.jpg" alt="地藏王菩薩(左)">
                                        <p class="artifact-title">地藏王菩薩(左)</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/floor3/floor3_04.jpg" alt="地藏王菩薩(後)">
                                        <p class="artifact-title">地藏王菩薩(後)</p>
                                    </div>
                                </div>
                            </div>
                            <!-- 分類四：四樓文殊殿 -->
                            <div class="artifact-section">
                                <h3 class="artifact-category">四樓文殊殿</h3>
                                <div class="artifact-grid">
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/floor4/floor4_01.jpg" alt="本殿布局">
                                        <p class="artifact-title">本殿布局</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/floor4/floor4_02.jpg" alt="文殊菩薩">
                                        <p class="artifact-title">文殊菩薩</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/floor4/floor4_03.jpg" alt="妙振和尚">
                                        <p class="artifact-title">妙振和尚</p>
                                    </div>
                                    <div class="artifact-item">
                                        <img src="../../assets/img/artifacts/floor4/floor4_04.jpg" alt="達能和尚">
                                        <p class="artifact-title">達能和尚</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="page-num">參</div>
                    </div>
    </div>
</div>

<!-- ══ Lightbox ══ -->
<div id="artifact-lightbox" role="dialog" aria-modal="true" aria-label="文物放大檢視">
    <button id="lightbox-close" aria-label="關閉"><i class="fas fa-xmark"></i></button>
    <button id="lightbox-prev" class="lightbox-nav" aria-label="上一張"><i class="fas fa-chevron-left"></i></button>
    <img id="lightbox-img" src="" alt="">
    <div id="lightbox-caption"></div>
    <button id="lightbox-next" class="lightbox-nav" aria-label="下一張"><i class="fas fa-chevron-right"></i></button>
</div>

<script>
(function () {
    'use strict';

    // 收集所有文物圖片
    const allImgs = Array.from(document.querySelectorAll('.artifact-item img'));
    let currentIdx = 0;

    const lightbox  = document.getElementById('artifact-lightbox');
    const lbImg     = document.getElementById('lightbox-img');
    const lbCaption = document.getElementById('lightbox-caption');
    const lbClose   = document.getElementById('lightbox-close');
    const lbPrev    = document.getElementById('lightbox-prev');
    const lbNext    = document.getElementById('lightbox-next');

    function openLightbox(idx) {
        currentIdx = idx;
        const img = allImgs[idx];
        lbImg.src = img.src;
        lbImg.alt = img.alt;
        lbCaption.textContent = img.alt;
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lightbox.classList.remove('open');
        lbImg.src = '';
        document.body.style.overflow = '';
    }

    function showPrev() {
        currentIdx = (currentIdx - 1 + allImgs.length) % allImgs.length;
        openLightbox(currentIdx);
    }

    function showNext() {
        currentIdx = (currentIdx + 1) % allImgs.length;
        openLightbox(currentIdx);
    }

    // 點擊圖片開啟
    allImgs.forEach((img, i) => {
        img.addEventListener('click', () => openLightbox(i));
    });

    lbClose.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', showPrev);
    lbNext.addEventListener('click', showNext);

    // 點擊背景關閉
    lightbox.addEventListener('click', function (e) {
        if (e.target === lightbox) closeLightbox();
    });

    // 鍵盤操作
    document.addEventListener('keydown', function (e) {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'Escape')      closeLightbox();
        if (e.key === 'ArrowLeft')   showPrev();
        if (e.key === 'ArrowRight')  showNext();
    });

    // 觸控左右滑動
    let _touchX = 0;
    lightbox.addEventListener('touchstart', e => { _touchX = e.touches[0].clientX; }, { passive: true });
    lightbox.addEventListener('touchend', e => {
        const diff = e.changedTouches[0].clientX - _touchX;
        if (Math.abs(diff) > 50) diff < 0 ? showNext() : showPrev();
    });
})();
</script>
</body>
</html>

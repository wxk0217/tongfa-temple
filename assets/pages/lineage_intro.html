<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>法脈傳承</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&display=swap">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100%;height:100%;overflow:hidden;
                  background:#fffcf5;font-family:'Noto Serif TC','STSong',serif;}
        .scroll-wrap{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
        .wrap{padding:36px 32px;}
        h2{font-size:1.25rem;font-weight:700;color:#5d4037;
           letter-spacing:5px;margin-bottom:8px;}
        .subtitle{font-size:0.8rem;color:#c6a059;letter-spacing:3px;margin-bottom:20px;}
        .divider{width:100%;height:1px;background:rgba(198,160,89,0.3);margin-bottom:20px;}
        p{font-size:0.88rem;line-height:2.1;color:#3d2b1f;margin-bottom:14px;}
        .lineage-index{margin-top:24px;}
        .lineage-index h3{font-size:0.85rem;color:#5d4037;letter-spacing:3px;
                          margin-bottom:12px;border-left:3px solid #c6a059;padding-left:10px;}
        .index-item{display:flex;align-items:baseline;gap:8px;
                    padding:6px 0;border-bottom:1px dashed rgba(198,160,89,0.2);}
        .index-num{font-size:0.75rem;color:#c6a059;min-width:20px;}
        .index-name{font-size:0.85rem;color:#3d2b1f;}
        .index-era{font-size:0.75rem;color:#9a8a7a;margin-left:auto;}
    </style>
</head>
<body>
<div class="scroll-wrap">
<div class="wrap">
    <h2>法脈傳承</h2>
    <div class="subtitle">曹洞正宗法脈源流</div>
    <div class="divider"></div>
    <p>通法禪寺傳承曹洞宗法脈，源自唐代洞山良价禪師開創之曹洞宗，歷經千年傳承，經由壽昌法派傳至福建鼓山湧泉寺，再由覺力禪師渡海來台，於台灣開花結果。</p>
    <p>曹洞宗以「默照禪」為修行核心，強調在日常生活中體悟佛法，以「五位君臣」說詮釋宇宙與人心的關係，禪風細密沉穩。</p>
    <p>本節收錄三幅法脈圖，以及在傳承中具有重要地位的祖師傳記，供信眾了解本寺法脈淵源。</p>
</div>
</div>
</body>
</html>

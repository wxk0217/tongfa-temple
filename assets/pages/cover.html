<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>封面</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #1b3040;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        svg { width: 72%; height: 92%; }
    </style>
</head>
<body>
<svg viewBox="0 0 260 760" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">

    <!-- 封面底色 -->
    <rect width="260" height="760" fill="#1b3040"/>

    <!-- 方框底色（稍淺藏青） -->
    <rect x="18" y="18" width="224" height="724" rx="1" fill="#21384a"/>

    <!-- 外框金線 -->
    <rect x="18" y="18" width="224" height="724" rx="1" fill="none" stroke="#c6a059" stroke-width="1.4"/>
    <!-- 內框細線 -->
    <rect x="26" y="26" width="208" height="708" rx="1" fill="none" stroke="#c6a059" stroke-width="0.35" opacity="0.5"/>

    <!-- 四角花飾 -->
    <g fill="#c6a059" opacity="0.75">
        <path d="M18,18 L32,18 L18,32 Z"/><circle cx="18" cy="18" r="1.8"/>
        <path d="M242,18 L228,18 L242,32 Z"/><circle cx="242" cy="18" r="1.8"/>
        <path d="M18,742 L32,742 L18,728 Z"/><circle cx="18" cy="742" r="1.8"/>
        <path d="M242,742 L228,742 L242,728 Z"/><circle cx="242" cy="742" r="1.8"/>
    </g>

    <!-- 中點菱形 -->
    <g fill="#c6a059" opacity="0.5">
        <polygon points="130,14 133,18 130,22 127,18"/>
        <polygon points="130,728 133,732 130,736 127,732"/>
        <polygon points="14,380 18,384 22,380 18,376"/>
        <polygon points="238,380 242,384 246,380 242,376"/>
    </g>

    <!-- 9格均勻分配：框內 y=42~736，共694px ÷ 9 = 77.1px/格
         各格中心 y：42 + 77.1×(n+0.5)
         n=0:81  n=1:158  n=2:235  n=3:312
         n=4:389（蓮花）
         n=5:466  n=6:543  n=7:620  n=8:697
         text baseline = 中心 + 17 -->
    <g font-family="'Noto Serif TC','全真楷體','STKaiti','KaiTi','標楷體',serif"
       font-weight="300" font-size="46"
       fill="#f0e6c8" text-anchor="middle">
        <text x="130" y="98">曹</text>
        <text x="130" y="175">洞</text>
        <text x="130" y="252">正</text>
        <text x="130" y="329">宗</text>
        <text x="130" y="483">通</text>
        <text x="130" y="560">法</text>
        <text x="130" y="637">禪</text>
        <text x="130" y="714">寺</text>
    </g>

    <!-- 蓮花：格4中心 y=389，「宗」底≈343，「通」頂≈467，間距充足 -->
    <g transform="translate(130,389)" opacity="0.82">
        <line x1="-50" y1="0" x2="-20" y2="0" stroke="#c6a059" stroke-width="0.65" opacity="0.55"/>
        <line x1="20"  y1="0" x2="50"  y2="0" stroke="#c6a059" stroke-width="0.65" opacity="0.55"/>
        <ellipse fill="none" stroke="#c6a059" stroke-width="0.8" cx="0" cy="-7.5" rx="2.4" ry="5"/>
        <ellipse fill="none" stroke="#c6a059" stroke-width="0.8" cx="0" cy="-7.5" rx="2.4" ry="5" transform="rotate(45)"/>
        <ellipse fill="none" stroke="#c6a059" stroke-width="0.8" cx="0" cy="-7.5" rx="2.4" ry="5" transform="rotate(90)"/>
        <ellipse fill="none" stroke="#c6a059" stroke-width="0.8" cx="0" cy="-7.5" rx="2.4" ry="5" transform="rotate(135)"/>
        <ellipse fill="none" stroke="#c6a059" stroke-width="0.8" cx="0" cy="-7.5" rx="2.4" ry="5" transform="rotate(180)"/>
        <ellipse fill="none" stroke="#c6a059" stroke-width="0.8" cx="0" cy="-7.5" rx="2.4" ry="5" transform="rotate(225)"/>
        <ellipse fill="none" stroke="#c6a059" stroke-width="0.8" cx="0" cy="-7.5" rx="2.4" ry="5" transform="rotate(270)"/>
        <ellipse fill="none" stroke="#c6a059" stroke-width="0.8" cx="0" cy="-7.5" rx="2.4" ry="5" transform="rotate(315)"/>
        <circle cx="0" cy="0" r="3.2" fill="none" stroke="#c6a059" stroke-width="0.75"/>
        <circle cx="0" cy="0" r="1.2" fill="#c6a059" opacity="0.7"/>
    </g>

</svg>
</body>
</html>

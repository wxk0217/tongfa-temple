<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扉頁</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #fffcf5;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .wrap { width: 88%; height: 88%; display: flex; align-items: center; justify-content: center; }
  svg { width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="wrap">
<svg viewBox="0 0 320 480" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <rect width="320" height="480" fill="#fffcf5"/>
  <rect x="10" y="10" width="300" height="460" fill="none" stroke="#c6a059" stroke-width="0.8" opacity="0.4"/>
  <line x1="178" y1="24" x2="178" y2="456" stroke="#c6a059" stroke-width="0.5" opacity="0.3"/>

  <!-- 右列 -->
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="238" y="38">朢</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="238" y="73">佛</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="238" y="108">本</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="238" y="143">願</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="238" y="178">意</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="238" y="213">在</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="238" y="248">眾</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="238" y="283">生</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="238" y="318">對</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="238" y="353">上</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="238" y="388">以</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="238" y="423">敬</text>

  <!-- 左列 -->
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="118" y="38">對</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="118" y="73">下</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="118" y="108">以</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="118" y="143">慈</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="118" y="178">對</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="118" y="213">人</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="118" y="248">以</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="118" y="283">和</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="118" y="318">對</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="118" y="353">事</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="118" y="388">以</text>
  <text font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="24" fill="#4a3728" text-anchor="middle" x="118" y="423">真</text>

  <!-- 印章 -->
  <g transform="translate(30, 390)">
    <rect width="42" height="60" fill="#c0392b" rx="3"/>
    <text font-family="'Noto Serif TC','STSong',serif" font-size="13" fill="#fffcf5" font-weight="bold" text-anchor="middle" x="21" y="18">通法</text>
    <text font-family="'Noto Serif TC','STSong',serif" font-size="13" fill="#fffcf5" font-weight="bold" text-anchor="middle" x="21" y="48">禪寺</text>
  </g>
</svg>
</div>
</body>
</html>

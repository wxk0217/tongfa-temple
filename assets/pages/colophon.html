<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扉頁</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #fffcf5;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .wrap { width: 88%; height: 88%; display: flex; align-items: center; justify-content: center; }
  svg { width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="wrap">
<svg viewBox="0 0 320 480" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <rect width="320" height="480" fill="#fffcf5"/>
  <rect x="10" y="10" width="300" height="460" fill="none" stroke="#c6a059" stroke-width="0.8" opacity="0.4"/>
  <line x1="160" y1="28" x2="160" y2="452" stroke="#c6a059" stroke-width="0.5" opacity="0.3"/>

  <!-- 右列：朢佛本願 意在眾生 對上以敬 -->
  <!-- 每字 22px + spacing 6px = 28px × 9字 = 252px，從 y=50 開始，到 302，留足空間 -->
  <text font-family="'Noto Serif TC','STSong','SimSun',serif"
        font-size="22" fill="#4a3728" letter-spacing="6"
        writing-mode="tb-rl" text-anchor="start"
        x="228" y="50">朢佛本願意在眾生對上以敬</text>

  <!-- 左列：對下以慈 對人以和 對事以真 -->
  <text font-family="'Noto Serif TC','STSong','SimSun',serif"
        font-size="22" fill="#4a3728" letter-spacing="6"
        writing-mode="tb-rl" text-anchor="start"
        x="118" y="50">對下以慈對人以和對事以真</text>

  <!-- 印章：左下角 -->
  <g transform="translate(32, 370)">
    <rect width="42" height="68" fill="#c0392b" rx="3"/>
    <text font-family="'Noto Serif TC','STSong',serif"
          font-size="14" fill="#fffcf5" font-weight="bold"
          writing-mode="tb-rl" text-anchor="start"
          x="30" y="14" letter-spacing="3">通法禪寺</text>
  </g>
</svg>
</div>
</body>
</html>

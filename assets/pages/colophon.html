<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扉頁</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #fffcf5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .colophon-wrap {
            width: 92%;
            height: 92%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        svg { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="colophon-wrap">
        <svg viewBox="0 0 340 460" xmlns="http://www.w3.org/2000/svg"
             preserveAspectRatio="xMidYMid meet">

            <!-- 淡底框 -->
            <rect x="8" y="8" width="324" height="444"
                  fill="none" stroke="#c6a059" stroke-width="0.8" opacity="0.3"/>

            <!-- 列間細線（從右到左分三列）-->
            <line x1="226" y1="30" x2="226" y2="430"
                  stroke="#c6a059" stroke-width="0.5" opacity="0.3"/>
            <line x1="114" y1="30" x2="114" y2="430"
                  stroke="#c6a059" stroke-width="0.5" opacity="0.3"/>

            <!-- 橫向分隔（上下兩句中間）-->
            <line x1="30" y1="235" x2="310" y2="235"
                  stroke="#c6a059" stroke-width="0.5" opacity="0.25"/>

            <!-- 第一列（最右）：朢佛本願 / 意在眾生 -->
            <text font-family="'Noto Serif TC','STSong','SimSun',serif"
                  font-size="32" fill="#4a3728" letter-spacing="6"
                  writing-mode="tb-rl" text-anchor="middle"
                  x="283" y="52">朢佛本願</text>
            <text font-family="'Noto Serif TC','STSong','SimSun',serif"
                  font-size="32" fill="#4a3728" letter-spacing="6"
                  writing-mode="tb-rl" text-anchor="middle"
                  x="283" y="255">意在眾生</text>

            <!-- 第二列（中）：對上以靜 / 對下以慈 -->
            <text font-family="'Noto Serif TC','STSong','SimSun',serif"
                  font-size="32" fill="#4a3728" letter-spacing="6"
                  writing-mode="tb-rl" text-anchor="middle"
                  x="170" y="52">對上以靜</text>
            <text font-family="'Noto Serif TC','STSong','SimSun',serif"
                  font-size="32" fill="#4a3728" letter-spacing="6"
                  writing-mode="tb-rl" text-anchor="middle"
                  x="170" y="255">對下以慈</text>

            <!-- 第三列（最左）：對人以和 / 對事以真 -->
            <text font-family="'Noto Serif TC','STSong','SimSun',serif"
                  font-size="32" fill="#4a3728" letter-spacing="6"
                  writing-mode="tb-rl" text-anchor="middle"
                  x="57" y="52">對人以和</text>
            <text font-family="'Noto Serif TC','STSong','SimSun',serif"
                  font-size="32" fill="#4a3728" letter-spacing="6"
                  writing-mode="tb-rl" text-anchor="middle"
                  x="57" y="255">對事以真</text>

        </svg>
    </div>
</body>
</html>

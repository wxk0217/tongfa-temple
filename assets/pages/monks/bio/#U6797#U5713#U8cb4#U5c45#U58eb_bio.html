<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>林圓貴居士 傳記</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../../css/style.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100%;height:100%;overflow:auto;
                   background:#fffcf5;
                   font-family:'Noto Serif TC','STSong',serif;}
        .bio-wrap{
            padding:32px 28px 40px;
            max-width:100%;
        }
        .bio-title{
            font-size:1.1rem;font-weight:700;
            color:#5d4037;letter-spacing:4px;
            margin-bottom:6px;
        }
        .bio-era{
            font-size:0.78rem;color:#c6a059;
            letter-spacing:2px;margin-bottom:16px;
        }
        .bio-divider{
            width:100%;height:1px;
            background:rgba(198,160,89,0.3);
            margin-bottom:18px;
        }
        .bio-content{
            font-size:0.88rem;
            line-height:2.1;
            color:#3d2b1f;
        }
        .bio-content p{margin-bottom:14px;}
        .bio-loading{
            color:#c6a059;opacity:0.6;
            font-size:0.9rem;letter-spacing:2px;
        }
    </style>
</head>
<body>
    <div class="bio-wrap">
        <div class="bio-title">林圓貴居士</div>
        <div class="bio-era" id="bioEra"></div>
        <div class="bio-divider"></div>
        <div class="bio-content" id="bioContent">
            <span class="bio-loading">載入中...</span>
        </div>
    </div>
    <script>
    // 優先讀 md 檔案，失敗則顯示備援文字
    fetch('../../../../docs/monk/林貴圓居士.md')
        .then(r => { if(!r.ok) throw new Error('404'); return r.text(); })
        .then(text => {
            const lines = text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
            // 第一行若是標題就略過
            const start = (lines[0] && lines[0].length < 20) ? 1 : 0;
            document.getElementById('bioContent').innerHTML =
                lines.slice(start).map(l=>`<p>${l}</p>`).join('');
        })
        .catch(() => {
            document.getElementById('bioContent').innerHTML =
                '<p>林圓貴居士，曹洞宗法脈傳承祖師。</p><p style="color:#c6a059;font-size:0.8rem;margin-top:16px;">傳記整理中，敬請期待。</p>';
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>妙振老和尚</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../../css/style.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100%;height:100%;overflow:hidden;background:#1b3040;
                   font-family:'Noto Serif TC','STSong',serif;}
        .portrait-wrap{
            width:100%;height:100%;
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            gap:24px;padding:32px;
        }
        .portrait-wrap img{
            width:180px;height:220px;
            object-fit:cover;
            border:3px solid #c6a059;
            border-radius:4px;
            box-shadow:0 8px 24px rgba(0,0,0,0.4);
        }
        .portrait-placeholder{
            width:180px;height:220px;
            border:3px solid #c6a059;
            border-radius:4px;
            background:#21384a;
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            gap:8px;
        }
        .placeholder-char{
            font-size:4rem;color:rgba(198,160,89,0.5);
            font-weight:300;
        }
        .placeholder-label{
            font-size:0.75rem;color:rgba(198,160,89,0.4);
            letter-spacing:2px;
        }
        .portrait-name{
            font-size:1.6rem;font-weight:700;
            color:#f0e6c8;letter-spacing:6px;
            text-align:center;
        }
        .portrait-era{
            font-size:0.85rem;color:rgba(198,160,89,0.7);
            letter-spacing:3px;text-align:center;
        }
        .portrait-divider{
            width:60px;height:1px;
            background:rgba(198,160,89,0.4);
        }
    </style>
</head>
<body>
    <div class="portrait-wrap">
        
        <img src="../../../../assets/img/monks/妙振和尚.jpg" alt="妙振老和尚">
            <div class="placeholder-label">肖像待補</div>
        </div>
        <div class="portrait-divider"></div>
        <div class="portrait-name">妙振老和尚</div>
        <div class="portrait-era">【民】</div>
    </div>
</body>
</html>
